<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Raydo Residential Lease Agreement</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f5f7;
  margin: 0;
  color: #222;
}

header {
  background: #172033;
  color: white;
  padding: 24px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 25px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 18px rgba(0,0,0,.08);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

fieldset {
  border: 1px solid #d5d9df;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 22px;
}

legend {
  font-weight: bold;
  padding: 0 8px;
}

label {
  display: block;
  font-weight: bold;
  margin-top: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #c5cad1;
  border-radius: 6px;
  box-sizing: border-box;
}

textarea {
  min-height: 80px;
}

button {
  background: #172033;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 7px;
  cursor: pointer;
  margin: 6px;
}

button.secondary {
  background: #566070;
}

button.danger {
  background: #9b1c1c;
}

.signature-pad {
  border: 1px solid #333;
  height: 130px;
  background: white;
  border-radius: 6px;
  width: 100%;
  touch-action: none;
}

.actions {
  text-align: center;
  margin-top: 25px;
}

#leasePreview {
  display: none;
  background: white;
  padding: 35px;
  margin-top: 30px;
  border: 1px solid #ccc;
}

.lease-title {
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 25px;
}

.clause {
  margin-bottom: 14px;
  line-height: 1.5;
}

.signature-img {
  width: 280px;
  height: 100px;
  border: 1px solid #aaa;
  object-fit: contain;
}

@media print {
  body {
    background: white;
  }

  form, header, .actions {
    display: none;
  }

  #leasePreview {
    display: block !important;
    border: none;
    margin: 0;
    padding: 0;
  }
}
</style>
</head>

<body>

<header>
  <h1>Residential Lease Agreement</h1>
  <p>Separate Tenant Rental Form | Raydo Vernon Matthee</p>
</header>

<div class="container">

<form id="leaseForm">

<fieldset>
<legend>Landlord Details</legend>

<div class="grid">
  <div>
    <label>Landlord Full Name</label>
    <input id="landlordName" value="Raydo Vernon Matthee" required />
  </div>

  <div>
    <label>Landlord ID / Passport Number</label>
    <input id="landlordId" />
  </div>

  <div>
    <label>Landlord Phone</label>
    <input id="landlordPhone" />
  </div>

  <div>
    <label>Landlord Email</label>
    <input id="landlordEmail" type="email" />
  </div>
</div>
</fieldset>

<fieldset>
<legend>Property Details</legend>

<label>Rental Property Address</label>
<textarea id="propertyAddress" required>26 Second Avenue, Lambton, Ekurhuleni</textarea>

<div class="grid">
  <div>
    <label>Type of Rental</label>
    <select id="rentalType">
      <option>Separate rental portions / rooms within the property</option>
    </select>
  </div>

  <div>
    <label>Municipal Charges</label>
    <select id="municipalTerms">
      <option>Included in the monthly rent</option>
    </select>
  </div>
</div>
</fieldset>

<fieldset>
<legend>Lease Terms</legend>

<div class="grid">
  <div>
    <label>Lease Start Date</label>
    <input id="startDate" type="date" required />
  </div>

  <div>
    <label>Lease End Date</label>
    <input id="endDate" type="date" />
  </div>

  <div>
    <label>Rent Due Day</label>
    <input id="rentDueDay" value="1st day of each month" required />
  </div>

  <div>
    <label>Notice Period</label>
    <input id="noticePeriod" value="One calendar month written notice" />
  </div>
</div>

<label>General Lease Notes</label>
<textarea id="generalTerms">The tenants are renting separately. Each tenant is responsible for their own rent, deposit, conduct, guests, damage, and obligations. Municipal charges are included in the monthly rent unless there is excessive use, damage, unlawful use, tampering, illegal connections, or a separate written agreement.</textarea>
</fieldset>

<fieldset>
<legend>Tenant 1 Details</legend>

<div class="grid">
  <div><label>Full Name</label><input id="t1Name" required /></div>
  <div><label>ID / Passport Number</label><input id="t1Id" required /></div>
  <div><label>Phone</label><input id="t1Phone" required /></div>
  <div><label>Email</label><input id="t1Email" type="email" /></div>
  <div><label>Room / Area Rented</label><input id="t1Area" required /></div>
  <div><label>Monthly Rent</label><input id="t1Rent" placeholder="Example: R4,500" required /></div>
  <div><label>Deposit</label><input id="t1Deposit" placeholder="Example: R4,500" /></div>
  <div><label>Emergency Contact</label><input id="t1Emergency" /></div>
</div>
</fieldset>

<fieldset>
<legend>Tenant 2 Details</legend>

<div class="grid">
  <div><label>Full Name</label><input id="t2Name" required /></div>
  <div><label>ID / Passport Number</label><input id="t2Id" required /></div>
  <div><label>Phone</label><input id="t2Phone" required /></div>
  <div><label>Email</label><input id="t2Email" type="email" /></div>
  <div><label>Room / Area Rented</label><input id="t2Area" required /></div>
  <div><label>Monthly Rent</label><input id="t2Rent" placeholder="Example: R4,500" required /></div>
  <div><label>Deposit</label><input id="t2Deposit" placeholder="Example: R4,500" /></div>
  <div><label>Emergency Contact</label><input id="t2Emergency" /></div>
</div>
</fieldset>

<fieldset>
<legend>House Rules</legend>

<div class="grid">
  <div>
    <label>Pets</label>
    <select id="pets">
      <option>No pets allowed without written permission</option>
      <option>Pets allowed with written permission</option>
      <option>Pets allowed</option>
    </select>
  </div>

  <div>
    <label>Smoking</label>
    <select id="smoking">
      <option>No smoking inside the property</option>
      <option>Smoking allowed outside only</option>
      <option>No smoking anywhere on the property</option>
    </select>
  </div>
</div>

<label>Additional Rules</label>
<textarea id="houseRules">No illegal activity. No nuisance, excessive noise, overcrowding, subletting, or alterations without written permission. Tenants must keep their rented area and shared areas clean and must immediately report damage, leaks, electrical faults, or security issues.</textarea>
</fieldset>

<fieldset>
<legend>Digital Signatures</legend>

<label>Landlord Signature</label>
<canvas id="landlordSig" class="signature-pad"></canvas>
<button type="button" class="secondary" onclick="clearSignature('landlordSig')">Clear Landlord Signature</button>

<label>Tenant 1 Signature</label>
<canvas id="t1Sig" class="signature-pad"></canvas>
<button type="button" class="secondary" onclick="clearSignature('t1Sig')">Clear Tenant 1 Signature</button>

<label>Tenant 2 Signature</label>
<canvas id="t2Sig" class="signature-pad"></canvas>
<button type="button" class="secondary" onclick="clearSignature('t2Sig')">Clear Tenant 2 Signature</button>
</fieldset>

</form>

<div class="actions">
  <button onclick="generateLease()">Generate Lease Preview</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="window.print()">Print</button>
  <button onclick="emailLease()">Email Summary</button>
</div>

<div id="leasePreview"></div>

</div>

<script>
const $ = id => document.getElementById(id);
const val = id => $(id).value || "";

function setupSignaturePad(id) {
  const canvas = $(id);
  const ctx = canvas.getContext("2d");
  let drawing = false;

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = 130;
  }

  resize();
  window.addEventListener("resize", resize);

  function position(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function start(e) {
    drawing = true;
    const p = position(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    e.preventDefault();
  }

  function draw(e) {
    if (!drawing) return;
    const p = position(e);
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    e.preventDefault();
  }

  function stop() {
    drawing = false;
  }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", draw);
  canvas.addEventListener("mouseup", stop);
  canvas.addEventListener("mouseleave", stop);

  canvas.addEventListener("touchstart", start);
  canvas.addEventListener("touchmove", draw);
  canvas.addEventListener("touchend", stop);
}

function clearSignature(id) {
  const canvas = $(id);
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
}

function validateForm() {
  const form = $("leaseForm");
  if (!form.checkValidity()) {
    form.reportValidity();
    return false;
  }
  return true;
}

function generateLease() {
  if (!validateForm()) return;

  const landlordSig = $("landlordSig").toDataURL();
  const t1Sig = $("t1Sig").toDataURL();
  const t2Sig = $("t2Sig").toDataURL();

  $("leasePreview").innerHTML = `
    <div class="lease-title">
      <h1>Residential Lease Agreement</h1>
      <p>Separate Rental Agreement for Two Tenants</p>
    </div>

    <div class="clause">
      This Residential Lease Agreement is entered into by <strong>${val("landlordName")}</strong>,
      ID/Passport No. <strong>${val("landlordId") || "________________"}</strong>, as Landlord,
      for the rental property situated at <strong>${val("propertyAddress")}</strong>.
    </div>

    <h2>1. Nature of Rental</h2>
    <div class="clause">
      The tenants are renting separately and not as joint tenants. Each tenant is responsible for
      their own monthly rent, deposit, rented area, conduct, guests, and obligations under this agreement.
    </div>

    <h2>2. Lease Period</h2>
    <div class="clause">
      Start Date: <strong>${val("startDate")}</strong><br>
      End Date: <strong>${val("endDate") || "Month-to-month / until terminated by written notice"}</strong><br>
      Notice Period: <strong>${val("noticePeriod")}</strong>
    </div>

    <h2>3. Tenant 1</h2>
    <div class="clause">
      Name: <strong>${val("t1Name")}</strong><br>
      ID/Passport: <strong>${val("t1Id")}</strong><br>
      Phone: <strong>${val("t1Phone")}</strong><br>
      Email: <strong>${val("t1Email")}</strong><br>
      Area Rented: <strong>${val("t1Area")}</strong><br>
      Monthly Rent: <strong>${val("t1Rent")}</strong><br>
      Deposit: <strong>${val("t1Deposit") || "None recorded"}</strong><br>
      Emergency Contact: <strong>${val("t1Emergency")}</strong>
    </div>

    <h2>4. Tenant 2</h2>
    <div class="clause">
      Name: <strong>${val("t2Name")}</strong><br>
      ID/Passport: <strong>${val("t2Id")}</strong><br>
      Phone: <strong>${val("t2Phone")}</strong><br>
      Email: <strong>${val("t2Email")}</strong><br>
      Area Rented: <strong>${val("t2Area")}</strong><br>
      Monthly Rent: <strong>${val("t2Rent")}</strong><br>
      Deposit: <strong>${val("t2Deposit") || "None recorded"}</strong><br>
      Emergency Contact: <strong>${val("t2Emergency")}</strong>
    </div>

    <h2>5. Rent and Payment</h2>
    <div class="clause">
      Rent is payable by each tenant separately on or before the <strong>${val("rentDueDay")}</strong>.
      Non-payment by one tenant does not excuse the other tenant from paying their own rent.
    </div>

    <h2>6. Municipal Charges</h2>
    <div class="clause">
      Municipal charges are <strong>${val("municipalTerms")}</strong>. This includes ordinary municipal
      charges connected to the residential use of the property. Excessive use, unlawful use, damage,
      tampering, illegal connections, fines, penalties, or special services may be recovered separately
      from the responsible tenant.
    </div>

    <h2>7. Use of Property</h2>
    <div class="clause">
      The property may only be used for lawful residential purposes. No tenant may sublet, assign,
      overcrowd, alter, damage, or misuse the property without the Landlord’s written permission.
    </div>

    <h2>8. House Rules</h2>
    <div class="clause">
      Pets: <strong>${val("pets")}</strong><br>
      Smoking: <strong>${val("smoking")}</strong><br><br>
      ${val("houseRules")}
    </div>

    <h2>9. General Terms</h2>
    <div class="clause">
      ${val("generalTerms")}
    </div>

    <h2>10. Inspection and Condition</h2>
    <div class="clause">
      The parties should complete a move-in inspection and record the condition of the rented area,
      shared spaces, keys, remotes, fittings, furniture, and appliances. Damage beyond fair wear and tear
      may be deducted from the responsible tenant’s deposit.
    </div>

    <h2>11. Signatures</h2>

    <p><strong>Landlord:</strong> ${val("landlordName")}</p>
    <img class="signature-img" src="${landlordSig}">
    <p>Date: ${new Date().toLocaleDateString()}</p>

    <p><strong>Tenant 1:</strong> ${val("t1Name")}</p>
    <img class="signature-img" src="${t1Sig}">
    <p>Date: ${new Date().toLocaleDateString()}</p>

    <p><strong>Tenant 2:</strong> ${val("t2Name")}</p>
    <img class="signature-img" src="${t2Sig}">
    <p>Date: ${new Date().toLocaleDateString()}</p>
  `;

  $("leasePreview").style.display = "block";
  $("leasePreview").scrollIntoView({ behavior: "smooth" });
}

function downloadPDF() {
  generateLease();

  const element = $("leasePreview");

  html2pdf()
    .set({
      margin: 10,
      filename: "Residential-Lease-Agreement-Raydo-Matthee.pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    })
    .from(element)
    .save();
}

function emailLease() {
  generateLease();

  const subject = encodeURIComponent("Residential Lease Agreement");
  const body = encodeURIComponent(
    $("leasePreview").innerText +
    "\n\nPlease download and attach the signed PDF if required."
  );

  window.location.href = `mailto:${val("landlordEmail")}?subject=${subject}&body=${body}`;
}

["landlordSig", "t1Sig", "t2Sig"].forEach(setupSignaturePad);
</script>

</body>
</html>
